<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudentHub — Connect, Collaborate, Grow</title>
<meta name="description" content="StudentHub is the platform for students, fresh graduates, and learners to connect, collaborate, find jobs, and grow their careers.">
<meta property="og:title" content="StudentHub">
<meta property="og:description" content="Connect with 50,000+ students. Find jobs, mentors, teammates & more.">
<meta property="og:type" content="website">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%236c63ff'/><text y='.9em' font-size='70' x='15'>S</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0a0c10;--bg2:#111318;--bg3:#181c24;--bg4:#1e2330;
--border:#ffffff12;--border2:#ffffff20;--border3:#ffffff30;
--text:#e8eaf2;--text2:#9ba3b8;--text3:#6b7289;
--accent:#6c63ff;--accent2:#8b85ff;--accentbg:#6c63ff18;
--green:#22d3a0;--greenbg:#22d3a018;
--amber:#f59e0b;--amberbg:#f59e0b18;
--red:#ef4444;--redbg:#ef444418;
--blue:#38bdf8;--bluebg:#38bdf818;
--pink:#ec4899;--pinkbg:#ec489918;
--r4:4px;--r8:8px;--r12:12px;--r16:16px;--r20:20px;
font-family:'DM Sans',sans-serif;
}
body{background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:56px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:20px}
.right-panel{width:280px;background:var(--bg2);border-left:1px solid var(--border);overflow-y:auto;padding:16px;flex-shrink:0}
.logo{padding:16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--pink));border-radius:var(--r8);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:14px;color:#fff}
.logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;color:var(--text)}
.logo-text span{color:var(--accent)}
.nav-section{padding:12px 8px 4px}
.nav-label{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:1px;text-transform:uppercase;padding:0 8px;margin-bottom:4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r8);cursor:pointer;transition:all .15s;font-size:13px;color:var(--text2);position:relative}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--accentbg);color:var(--accent)}
.nav-badge{margin-left:auto;background:var(--accent);color:#fff;font-size:10px;font-weight:600;padding:1px 6px;border-radius:10px}
.user-area{margin-top:auto;padding:12px;border-top:1px solid var(--border)}
.user-mini{display:flex;align-items:center;gap:8px;padding:8px;border-radius:var(--r8);cursor:pointer;transition:.15s}
.user-mini:hover{background:var(--bg3)}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--pink));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#fff;flex-shrink:0}
.avatar.sm{width:28px;height:28px;font-size:11px}
.avatar.lg{width:48px;height:48px;font-size:16px}
.avatar.xl{width:72px;height:72px;font-size:22px}
.search-bar{flex:1;max-width:360px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r8);padding:0 12px;height:34px;display:flex;align-items:center;gap:8px}
.search-bar input{background:none;border:none;outline:none;color:var(--text);font-size:13px;flex:1;font-family:'DM Sans',sans-serif}
.search-bar input::placeholder{color:var(--text3)}
.topbar-actions{margin-left:auto;display:flex;align-items:center;gap:8px}
.icon-btn{width:34px;height:34px;border-radius:var(--r8);background:var(--bg3);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;transition:.15s;color:var(--text2)}
.icon-btn:hover{background:var(--bg4);color:var(--text)}
.notif-dot{position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:50%;background:var(--accent);border:2px solid var(--bg2)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r12);padding:16px;margin-bottom:12px}
.card:hover{border-color:var(--border2)}
.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:500;cursor:default}
.tag.purple{background:var(--accentbg);color:var(--accent2)}
.tag.green{background:var(--greenbg);color:var(--green)}
.tag.amber{background:var(--amberbg);color:var(--amber)}
.tag.blue{background:var(--bluebg);color:var(--blue)}
.tag.pink{background:var(--pinkbg);color:var(--pink)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r8);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;border:none;font-family:'DM Sans',sans-serif}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--text2)}
.btn-outline:hover{background:var(--bg3);color:var(--text)}
.btn-ghost{background:transparent;border:none;color:var(--text2)}
.btn-sm{padding:4px 10px;font-size:12px}
.post{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r12);padding:16px;margin-bottom:12px}
.post:hover{border-color:var(--border2)}
.post-header{display:flex;gap:10px;margin-bottom:10px}
.post-meta{flex:1}
.post-name{font-size:14px;font-weight:600;color:var(--text)}
.post-info{font-size:12px;color:var(--text3);margin-top:1px}
.post-body{font-size:14px;color:var(--text2);line-height:1.65;margin-bottom:12px}
.post-actions{display:flex;gap:4px;padding-top:10px;border-top:1px solid var(--border)}
.post-action{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:var(--r8);font-size:12px;color:var(--text3);cursor:pointer;transition:.15s}
.post-action:hover{background:var(--bg3);color:var(--text)}
.post-action.liked{color:var(--pink)}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r12);padding:14px}
.stat-val{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--text);margin-bottom:2px}
.stat-lbl{font-size:11px;color:var(--text3)}
.stat-trend{font-size:11px;margin-top:4px;color:var(--green)}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--text)}
.job-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r12);padding:14px;margin-bottom:10px;cursor:pointer;transition:.15s}
.job-card:hover{border-color:var(--accent);background:var(--bg3)}
.job-logo{width:40px;height:40px;border-radius:var(--r8);background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:var(--accent)}
.job-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:3px}
.job-company{font-size:12px;color:var(--text3)}
.job-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.community-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r12);overflow:hidden;cursor:pointer;transition:.15s}
.community-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.community-banner{height:60px;display:flex;align-items:center;justify-content:center;font-size:24px}
.community-info{padding:12px}
.community-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px}
.community-meta{font-size:11px;color:var(--text3)}
.roadmap-step{display:flex;gap:12px;padding:12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r8);margin-bottom:8px;cursor:pointer;transition:.15s}
.roadmap-step:hover{border-color:var(--border2)}
.roadmap-step.done{border-color:var(--green);background:var(--greenbg)}
.roadmap-step.active{border-color:var(--accent);background:var(--accentbg)}
.step-num{width:28px;height:28px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--text2);flex-shrink:0}
.roadmap-step.done .step-num{background:var(--green);border-color:var(--green);color:#000}
.roadmap-step.active .step-num{background:var(--accent);border-color:var(--accent);color:#fff}
.notif-item{display:flex;gap:10px;padding:10px;border-radius:var(--r8);cursor:pointer;transition:.15s}
.notif-item:hover{background:var(--bg3)}
.notif-item.unread{background:var(--accentbg)}
.notif-dot2{width:7px;height:7px;border-radius:50%;background:var(--accent);margin-top:5px;flex-shrink:0}
.tabs{display:flex;gap:2px;background:var(--bg3);border-radius:var(--r8);padding:3px;margin-bottom:16px}
.tab{flex:1;text-align:center;padding:6px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;transition:.15s;color:var(--text3)}
.tab.active{background:var(--bg2);color:var(--text)}
.skill-bar{margin-bottom:10px}
.skill-bar-label{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:4px}
.skill-bar-track{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.skill-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--pink))}
.match-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r12);padding:14px;text-align:center;cursor:pointer;transition:.15s}
.match-card:hover{border-color:var(--accent);background:var(--bg3)}
.match-pct{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--green)}
.mentor-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r12);padding:14px;text-align:center;cursor:pointer;transition:.15s}
.mentor-card:hover{border-color:var(--amber)}
.mentor-company{font-size:11px;color:var(--amber)}
.star{color:var(--amber);font-size:12px}
.input{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r8);padding:8px 12px;color:var(--text);font-size:13px;outline:none;width:100%;font-family:'DM Sans',sans-serif}
.input:focus{border-color:var(--accent)}
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px}
.auth-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r20);padding:32px;width:100%;max-width:380px}
.form-label{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px;display:block}
.form-group{margin-bottom:14px}
.social-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:9px;border:1px solid var(--border2);border-radius:var(--r8);cursor:pointer;font-size:13px;color:var(--text2);transition:.15s;background:transparent;width:100%;margin-bottom:8px;font-family:'DM Sans',sans-serif}
.social-btn:hover{background:var(--bg3);color:var(--text)}
.divider{display:flex;align-items:center;gap:10px;margin:16px 0;color:var(--text3);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.profile-cover{width:100%;height:120px;border-radius:var(--r12);background:linear-gradient(135deg,#1a1040 0%,#0d1a30 50%,#0a1020 100%);margin-bottom:-36px;position:relative;overflow:hidden}
.profile-cover::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,#6c63ff22,transparent 60%)}
.chat-list{border-right:1px solid var(--border);width:220px;flex-shrink:0}
.chat-item{padding:10px 12px;cursor:pointer;transition:.15s;border-bottom:1px solid var(--border)}
.chat-item:hover{background:var(--bg3)}
.chat-item.active{background:var(--accentbg)}
.chat-preview{font-size:12px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-window{flex:1;display:flex;flex-direction:column}
.messages-area{flex:1;padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
.msg{max-width:70%;padding:10px 14px;border-radius:var(--r12);font-size:13px;line-height:1.5}
.msg.them{background:var(--bg3);color:var(--text2);border-radius:4px 14px 14px 14px;align-self:flex-start}
.msg.me{background:var(--accent);color:#fff;border-radius:14px 4px 14px 14px;align-self:flex-end}
.chat-input-row{padding:12px;border-top:1px solid var(--border);display:flex;gap:8px}
.chat-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r8);padding:8px 12px;color:var(--text);font-size:13px;outline:none;font-family:'DM Sans',sans-serif}
.ai-bubble{background:linear-gradient(135deg,var(--accentbg),var(--pinkbg));border:1px solid var(--accent);border-radius:var(--r12);padding:12px;font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:10px}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.animate-in{animation:fadeIn .3s ease forwards}
.pulse{animation:pulse 2s infinite}
.progress-ring{transform:rotate(-90deg)}
.progress-ring circle{transition:stroke-dashoffset .5s}
</style>
</head>

function StudyRooms(){

  const fmt=s=>`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  const pct=(secs/(25*60))*100;
  return h('div',{className:'animate-in',style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}},

          h('div',{style:{fontFamily:'Syne,sans-serif',fontSize:28,fontWeight:800,color:'var(--text)'}},fmt(secs)),

      ),
      h('div',{style:{display:'flex',gap:8,justifyContent:'center'}},
        h('button',{className:'btn btn-primary',onClick:()=>setRunning(r=>!r)},running?'⏸ Pause':'▶ Start'),

function AIAssistant(){
  const [msgs,setMsgs]=useState([{role:'ai',text:"Hi! I'm your AI Career Assistant. Ask me about career paths, resume tips, interview prep, skill recommendations, and job search strategy!"}]);
  const [input,setInput]=useState('');
  const [loading,setLoading]=useState(false);
  const endRef=useRef(null);
  const send=async(text)=>{
    const msg=text||input.trim();
    if(!msg||loading)return;
    setInput('');
    setMsgs(m=>[...m,{role:'user',text:msg}]);
    setLoading(true);
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:'You are a helpful AI career assistant for StudentHub. Give concise actionable advice about careers, skills, resumes, and interviews. Keep responses under 120 words.',messages:[...msgs.filter(m=>m.role!=='ai').map(m=>({role:m.role,content:m.text})),{role:'user',content:msg}]})});
      const data=await res.json();
      setMsgs(m=>[...m,{role:'ai',text:data.content?.find(b=>b.type==='text')?.text||'Sorry, an error occurred.'}]);
    }catch(e){setMsgs(m=>[...m,{role:'ai',text:'Connection error. Please try again.'}]);}
    setLoading(false);
  };
  useEffect(()=>{endRef.current?.scrollIntoView({behavior:'smooth'});},[msgs]);
  return h('div',{className:'animate-in'},
    h('div',{className:'card',style:{padding:0,overflow:'hidden',display:'flex',flexDirection:'column',height:480}},
      h('div',{style:{padding:'12px 16px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:8}},
        h('div',{style:{width:32,height:32,borderRadius:'50%',background:'linear-gradient(135deg,var(--accent),var(--pink))',display:'flex',alignItems:'center',justifyContent:'center'}},h(Icon,{name:'robot',size:16,style:{color:'#fff'}})),
        h('div',{},h('div',{style:{fontSize:14,fontWeight:600,color:'var(--text)'}},'AI Career Assistant'),h('div',{style:{fontSize:11,color:'var(--green)'}},loading?'Thinking...':'● Online'))
      ),
      h('div',{style:{flex:1,overflow:'auto',padding:16,display:'flex',flexDirection:'column',gap:10}},
        msgs.map((m,i)=>h('div',{key:i,style:{display:'flex',gap:8,alignSelf:m.role==='user'?'flex-end':'flex-start',maxWidth:'80%',flexDirection:m.role==='user'?'row-reverse':'row'}},
          m.role==='ai'&&h('div',{style:{width:28,height:28,borderRadius:'50%',background:'linear-gradient(135deg,var(--accent),var(--pink))',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}},h(Icon,{name:'spark',size:13,style:{color:'#fff'}})),
          h('div',{style:{padding:'10px 14px',borderRadius:m.role==='user'?'14px 4px 14px 14px':'4px 14px 14px 14px',background:m.role==='user'?'var(--accent)':'var(--bg3)',color:m.role==='user'?'#fff':'var(--text2)',fontSize:13,lineHeight:1.6}},m.text)
        )),
        loading&&h('div',{style:{display:'flex',gap:4,padding:'10px 14px',background:'var(--bg3)',borderRadius:'4px 14px 14px 14px',width:'fit-content'}},
          [0,1,2].map(i=>h('div',{key:i,className:'pulse',style:{width:6,height:6,borderRadius:'50%',background:'var(--text3)',animationDelay:`${i*0.2}s`}}))
        ),
        h('div',{ref:endRef})
      ),
      msgs.length<=1&&h('div',{style:{padding:'0 16px 10px',display:'flex',gap:6,flexWrap:'wrap'}},
        ['Best skills for ML 2024','How to crack Google','Resume tips','Career path for PM'].map(s=>h('button',{key:s,className:'btn btn-outline btn-sm',style:{fontSize:11},onClick:()=>send(s)},s))
      ),
      h('div',{style:{padding:'10px 12px',borderTop:'1px solid var(--border)',display:'flex',gap:8}},
        h('input',{className:'chat-input',placeholder:'Ask about careers, skills, interviews...',value:input,onChange:e=>setInput(e.target.value),onKeyDown:e=>e.key==='Enter'&&send()}),
        h('button',{className:'btn btn-primary',onClick:()=>send(),style:{fontSize:12}},loading?'...':'Send')
      )
    )
  );
}

  if(!authed)return h(AuthPage,{onAuth:()=>setAuthed(true)});

    h(Sidebar,{page,setPage}),

      h(Topbar,{page}),
